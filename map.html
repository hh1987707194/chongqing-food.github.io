<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重庆美食地图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      padding: 20px;
    }
    /* 我帮你设置好的完美宽高 */
    #container {
      width: 100%;
      height: 750px;
      border-radius: 10px;
      margin-top: 15px;
    }
    .back {
      display: inline-block;
      margin-bottom: 10px;
      padding: 8px 16px;
      background: #333;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <a href="90.html" class="back">← 返回主页</a>
  <h2>重庆美食地图</h2>
  <div id="container"></div>

  <!-- 高德地图 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=5136fc1fd31d3a4999d83e893e334c18"></script>
  <script>
    var map = new AMap.Map('container', {
      zoom: 13,
      center: [106.5516, 29.5631]
    });
    var marker = new AMap.Marker({
      position: [106.5871, 29.5431],
      title: "解放碑美食区"
    });
    map.add(marker);
  </script>

</body>
</html>
